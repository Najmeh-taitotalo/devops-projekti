name: DevOps CI (Local Runner)

on: push

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t devops-projekti .
          echo "Docker image buildattu!"

      - name: Stop old container if exists
        run: |
          if (docker ps -q -f name=testi) {
            docker stop testi
            docker rm testi
            echo "Vanha kontti pysäytetty ja poistettu"
          } else {
            echo "Ei vanhaa konttia"
          }

      - name: Run Docker container locally
        run: |
          docker run -d -p 8080:80 --name test devops-projekti
          echo "Uusi kontti käynnissä!"

name: DevOps CI

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validoi HTML
        run: |
          echo "Tarkistetaan index.html..."
          cat index.html
          echo "✅ HTML OK"

      - name: Build Docker image
        run: |
          docker build -t devops-projekti .
          echo "✅ Docker image buildattu!"

      - name: Run Docker container
        run: |
          docker run -d --name testi -p 8080:80 devops-projekti
          echo "✅ Docker container käynnissä!"
      - name: Testaa sovellus
        run: |
          sleep 5 # Odotetaan hetki, että sovellus on käynnissä
          curl -f http://localhost:8080 || exit 1
          echo "✅ Sovellus toimii odotetusti!"